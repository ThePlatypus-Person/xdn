# =============================================================================
# XDN Configuration
# =============================================================================
# This file is read by XdnConfig at startup.
# Default location: conf/xdn.properties
# Override location via: -DxdnConfig=path/to/xdn.properties
#
# Required properties will cause XdnApp to throw immediately if absent.
# Optional properties fall back to the defaults shown below if absent.
# =============================================================================

# -----------------------------------------------------------------------------
# Sandbox type - the container runtime used to run services
# Required. Valid values: docker
# Future: podman, gvisor, firecracker, qemu
# -----------------------------------------------------------------------------
SANDBOX_TYPE=docker

# -----------------------------------------------------------------------------
# Recorder type - the state diff mechanism for non-deterministic services
# Required. Valid values: rsync, fuselog, fuserust, zip
#
# rsync    - filesystem diff via rsync batch files. Works everywhere. Slower.
# fuselog  - FUSE-based capture (C++). Linux only.
# fuserust - FUSE-based capture (Rust). Linux only. Recommended for production.
# zip      - full state snapshot via zip. Simplest but highest overhead.
# -----------------------------------------------------------------------------
RECORDER_TYPE=fuselog

# Base directory for fuselog state recorder
# Default: /tmp/xdn/state/fuselog/
FUSELOG_BASE_DIR=/tmp/xdn/state/fuselog/

# -----------------------------------------------------------------------------
# Healthcheck defaults - used by DockerSandboxManager.waitUntilReady()
# when no healthcheck command is defined for a service component.
# Optional. These values are used as the --health-* flags in docker run.
#
# Interval: seconds between healthcheck attempts
# Timeout:  seconds before a single attempt is considered failed
# Retries:  number of consecutive failures before the container is "unhealthy"
# -----------------------------------------------------------------------------
DEFAULT_HEALTHCHECK_INTERVAL_SECONDS=2
DEFAULT_HEALTHCHECK_TIMEOUT_SECONDS=5
DEFAULT_HEALTHCHECK_RETRIES=30
