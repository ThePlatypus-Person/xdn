<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e"/>
    </marker>
  </defs>

  <!-- ============ CLIENTS ============ -->
  <g>
    <rect x="30" y="55" width="150" height="64" rx="10" fill="#fafafa" stroke="#616161" stroke-width="1.5"/>
    <circle cx="60" cy="80" r="9" fill="none" stroke="#616161" stroke-width="1.5"/>
    <path d="M 47 103 q 13 -14 26 0" fill="none" stroke="#616161" stroke-width="1.5"/>
    <text x="82" y="92" font-size="15" fill="#212121" font-weight="bold">Client A</text>

    <rect x="30" y="300" width="150" height="64" rx="10" fill="#fafafa" stroke="#616161" stroke-width="1.5"/>
    <circle cx="60" cy="325" r="9" fill="none" stroke="#616161" stroke-width="1.5"/>
    <path d="M 47 348 q 13 -14 26 0" fill="none" stroke="#616161" stroke-width="1.5"/>
    <text x="82" y="337" font-size="15" fill="#212121" font-weight="bold">Client B</text>
  </g>

  <!-- session annotations -->
  <g font-size="12.5" fill="#616161">
    <text x="32" y="140">session of A = its ordered requests:</text>
    <rect x="32" y="149" width="16" height="16" fill="#1976d2" rx="2"/>
    <text x="52" y="162" fill="#212121">w&#8321;</text>
    <text x="72" y="162" fill="#616161">then</text>
    <circle cx="112" cy="157" r="8" fill="none" stroke="#616161" stroke-width="1.5"/>
    <text x="124" y="162" fill="#212121">r&#8321;</text>
    <text x="144" y="162" fill="#616161">then &#8230;</text>

    <text x="32" y="385">session of B: w&#8322;, then r&#8322; at a</text>
    <text x="32" y="401">different replica (migration)</text>
  </g>

  <!-- ============ REPLICAS ============ -->
  <g>
    <!-- R1 -->
    <rect x="620" y="40" width="290" height="106" rx="10" fill="#f3f8fe" stroke="#1976d2" stroke-width="1.8"/>
    <text x="636" y="64" font-size="15" font-weight="bold" fill="#0d47a1">Replica 1</text>
    <text x="717" y="64" font-size="12" fill="#616161">(source of w&#8321;)</text>
    <text x="636" y="90" font-size="12.5" fill="#616161">apply order:</text>
    <rect x="722" y="78" width="16" height="16" fill="#1976d2" rx="2"/>
    <text x="742" y="91" font-size="12.5" fill="#212121">w&#8321;</text>
    <text x="762" y="91" font-size="12.5" fill="#616161">&#8594;</text>
    <rect x="780" y="78" width="16" height="16" fill="#2e7d32" rx="2"/>
    <text x="800" y="91" font-size="12.5" fill="#212121">w&#8322;</text>
    <text x="636" y="126" font-size="12" fill="#616161">a read here returns the state</text>
    <text x="636" y="140" font-size="12" fill="#616161">produced by {w&#8321;, w&#8322;}</text>

    <!-- R2 -->
    <rect x="620" y="186" width="290" height="96" rx="10" fill="#f3f8fe" stroke="#1976d2" stroke-width="1.8"/>
    <text x="636" y="210" font-size="15" font-weight="bold" fill="#0d47a1">Replica 2</text>
    <text x="717" y="210" font-size="12" fill="#616161">(source of w&#8322;)</text>
    <text x="636" y="236" font-size="12.5" fill="#616161">apply order:</text>
    <rect x="722" y="224" width="16" height="16" fill="#2e7d32" rx="2"/>
    <text x="742" y="237" font-size="12.5" fill="#212121">w&#8322;</text>
    <text x="762" y="237" font-size="12.5" fill="#616161">&#8594;</text>
    <rect x="780" y="224" width="16" height="16" fill="#1976d2" rx="2"/>
    <text x="800" y="237" font-size="12.5" fill="#212121">w&#8321;</text>
    <text x="636" y="264" font-size="12" fill="#616161">same writes, different local order</text>

    <!-- R3 -->
    <rect x="620" y="322" width="290" height="102" rx="10" fill="#f3f8fe" stroke="#1976d2" stroke-width="1.8"/>
    <text x="636" y="346" font-size="15" font-weight="bold" fill="#0d47a1">Replica 3</text>
    <text x="636" y="372" font-size="12.5" fill="#616161">apply order:</text>
    <rect x="722" y="360" width="16" height="16" fill="#2e7d32" rx="2"/>
    <text x="742" y="373" font-size="12.5" fill="#212121">w&#8322;</text>
    <text x="636" y="400" font-size="12" fill="#616161">w&#8321; not delivered yet &#8212; a read</text>
    <text x="636" y="414" font-size="12" fill="#616161">here does not reflect w&#8321;</text>
  </g>

  <!-- ============ REQUEST / RESPONSE ARROWS ============ -->
  <g font-size="12.5">
    <!-- A -> R1 write -->
    <line x1="180" y1="75" x2="616" y2="68" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="300" y="60" fill="#212121">write w&#8321; (request)</text>
    <!-- R1 -> A response -->
    <line x1="616" y1="96" x2="180" y2="103" stroke="#424242" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <text x="300" y="118" fill="#616161">response (w&#8321; acknowledged)</text>

    <!-- B -> R2 write -->
    <line x1="180" y1="318" x2="616" y2="228" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="290" y="266" fill="#212121" transform="rotate(-11.5 290 266)">write w&#8322; (request)</text>

    <!-- B -> R3 later read (migration) -->
    <line x1="180" y1="345" x2="616" y2="370" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="278" y="374" fill="#212121" transform="rotate(3 278 374)">later read r&#8322; (session migrated)</text>
  </g>

  <!-- ============ PROPAGATION ARROWS ============ -->
  <g>
    <line x1="742" y1="150" x2="742" y2="182" stroke="#9e9e9e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowgray)"/>
    <line x1="788" y1="182" x2="788" y2="150" stroke="#9e9e9e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowgray)"/>
    <line x1="742" y1="286" x2="742" y2="318" stroke="#9e9e9e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowgray)"/>
    <text x="806" y="170" font-size="12" fill="#757575">asynchronous</text>
    <text x="806" y="184" font-size="12" fill="#757575">propagation</text>
    <text x="758" y="306" font-size="12" fill="#757575">propagation (w&#8321; still in flight)</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g font-size="12.5">
    <rect x="30" y="432" width="880" height="38" rx="8" fill="#fafafa" stroke="#e0e0e0"/>
    <line x1="46" y1="451" x2="86" y2="451" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="92" y="455" fill="#424242">request</text>
    <line x1="160" y1="451" x2="200" y2="451" stroke="#424242" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <text x="206" y="455" fill="#424242">response</text>
    <line x1="285" y1="451" x2="325" y2="451" stroke="#9e9e9e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowgray)"/>
    <text x="331" y="455" fill="#424242">async write propagation</text>
    <rect x="500" y="443" width="16" height="16" fill="#1976d2" rx="2"/>
    <rect x="520" y="443" width="16" height="16" fill="#2e7d32" rx="2"/>
    <text x="542" y="455" fill="#424242">writes, colored by their source replica</text>
  </g>
</svg>
